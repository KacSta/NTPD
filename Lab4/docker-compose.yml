version: "3.9"

services:
  app:
    build: .
    container_name: ml_api
    ports:
      - "8001:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - ml_network

  redis:
    image: redis:7-alpine
    container_name: ml_redis
    ports:
      - "6379:6379"
    networks:
      - ml_network

networks:
  ml_network:
    driver: bridge